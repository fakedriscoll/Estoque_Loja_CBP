<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque - Loja CBP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">
                <span class="cbp-text">CBP</span>
                <span class="sub-text">LOJA OFICIAL</span>
            </div>
            <nav>
                <ul>
                    <li><a href="#" class="active"><i class="fas fa-boxes"></i> Estoque</a></li>
                    <li><a href="#" id="btn-add-product"><i class="fas fa-plus-circle"></i> Novo Produto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="stats">
            <div class="stat-card">
                <h3>Total de Itens</h3>
                <p id="total-items">0</p>
            </div>
            <div class="stat-card">
                <h3>Valor em Estoque</h3>
                <p id="total-value">R$ 0,00</p>
            </div>
            <div class="stat-card alert">
                <h3>Estoque Baixo</h3>
                <p id="low-stock-count">0</p>
            </div>
        </section>

        <section class="inventory-controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Buscar produto por nome ou categoria...">
            </div>
            <div class="filter-box">
                <select id="category-filter">
                    <option value="all">Todas as Categorias</option>
                    <option value="Raquetes">Raquetes</option>
                    <option value="Bolas">Bolas</option>
                    <option value="Vestuário">Vestuário</option>
                    <option value="Acessórios">Acessórios</option>
                </select>
            </div>
        </section>

        <section class="inventory-table">
            <table>
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Categoria</th>
                        <th>Preço</th>
                        <th>Quantidade</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="inventory-body">
                    <!-- Produtos serão inseridos via JS -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- Modal para Adicionar/Editar Produto -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title">Novo Produto</h2>
            <form id="product-form">
                <input type="hidden" id="product-id">
                <div class="form-group">
                    <label for="name">Nome do Produto</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Categoria</label>
                        <select id="category" required>
                            <option value="Raquetes">Raquetes</option>
                            <option value="Bolas">Bolas</option>
                            <option value="Vestuário">Vestuário</option>
                            <option value="Acessórios">Acessórios</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="price">Preço (R$)</label>
                        <input type="number" id="price" step="0.01" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="quantity">Quantidade em Estoque</label>
                        <input type="number" id="quantity" required>
                    </div>
                    <div class="form-group">
                        <label for="min-quantity">Quantidade Mínima</label>
                        <input type="number" id="min-quantity" value="5" required>
                    </div>
                </div>
                <button type="submit" class="btn-save">Salvar Produto</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Confederação Brasileira de Pickleball - Sistema de Gestão de Loja</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
